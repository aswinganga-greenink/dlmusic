name: Publish Release Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_name: dlmusic-linux-amd64
            file_name: dlmusic-linux-amd64
          - os: macos-latest
            build_name: dlmusic-macos-amd64
            file_name: dlmusic-macos-amd64
          - os: windows-latest
            build_name: dlmusic-windows-amd64
            file_name: dlmusic-windows-amd64.exe

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install .

    - name: Build standalone binary
      run: pyinstaller --onefile --name ${{ matrix.build_name }} src/dlmusic/__main__.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.file_name }}
        generate_release_notes: true
