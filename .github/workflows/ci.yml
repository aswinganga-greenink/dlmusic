name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies and Xvfb
      run: |
        sudo apt-get update && sudo apt-get install -y xvfb libegl1 libgl1-mesa-glx libxkbcommon-x11-0 libglib2.0-0
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-qt PyQt6
        pip install -e .

    - name: Lint with Ruff
      run: |
        # Check for syntax errors and undefined names
        ruff check . --select=E9,F63,F7,F82

    - name: Test with pytest (Headless)
      run: |
        xvfb-run --auto-servernum pytest tests/ -v
